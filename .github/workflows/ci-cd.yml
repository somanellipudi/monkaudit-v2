name: CI/CD

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

permissions:
  contents: read
  id-token: write

env:
  NODE_VERSION: "22"
  GCP_REGION: asia-south1
  CLOUD_RUN_SERVICE: growingmonk-sales-os
  ARTIFACT_REGISTRY_REPOSITORY: growingmonk-growth-os
  IMAGE_NAME: growingmonk-growth-os

jobs:
  ci:
    name: Verify
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run verification
        run: npm run verify

  deploy:
    name: Deploy to Cloud Run
    runs-on: ubuntu-latest
    needs: ci
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    env:
      GCP_PROJECT_ID: ${{ secrets.GCP_PROJECT_ID || vars.GCP_PROJECT_ID || 'growingmonk-495400' }}
      GCP_WORKLOAD_IDENTITY_PROVIDER: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER || vars.GCP_WORKLOAD_IDENTITY_PROVIDER || 'projects/678831951654/locations/global/workloadIdentityPools/github/providers/gm-sales-audit' }}
      GCP_SERVICE_ACCOUNT: ${{ secrets.GCP_SERVICE_ACCOUNT || vars.GCP_SERVICE_ACCOUNT || 'monkaudit-runner@growingmonk-495400.iam.gserviceaccount.com' }}
      GCP_CREDENTIALS_JSON: ${{ secrets.GCP_CREDENTIALS_JSON }}
      FIRESTORE_DATABASE_ID: ${{ vars.FIRESTORE_DATABASE_ID || '(default)' }}
      GCS_BUCKET: ${{ vars.GCS_BUCKET }}
      ALLOWLIST_EMAILS: ${{ vars.ALLOWLIST_EMAILS }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate Google Cloud auth inputs
        run: |
          if [[ -z "${GCP_PROJECT_ID}" ]]; then
            echo "::error::Missing required secret GCP_PROJECT_ID."
            exit 1
          fi

          if [[ -n "${GCP_CREDENTIALS_JSON}" && -n "${GCP_WORKLOAD_IDENTITY_PROVIDER}" ]]; then
            echo "::error::Set either GCP_CREDENTIALS_JSON or GCP_WORKLOAD_IDENTITY_PROVIDER, not both."
            exit 1
          fi

          if [[ -z "${GCP_CREDENTIALS_JSON}" && -z "${GCP_WORKLOAD_IDENTITY_PROVIDER}" ]]; then
            echo "::error::Missing Google Cloud auth. Set GCP_WORKLOAD_IDENTITY_PROVIDER plus GCP_SERVICE_ACCOUNT, or set GCP_CREDENTIALS_JSON."
            exit 1
          fi

          if [[ -n "${GCP_WORKLOAD_IDENTITY_PROVIDER}" && -z "${GCP_SERVICE_ACCOUNT}" ]]; then
            echo "::error::GCP_SERVICE_ACCOUNT is required when using GCP_WORKLOAD_IDENTITY_PROVIDER."
            exit 1
          fi

      - name: Authenticate to Google Cloud with Workload Identity
        if: env.GCP_WORKLOAD_IDENTITY_PROVIDER != ''
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ env.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ env.GCP_SERVICE_ACCOUNT }}

      - name: Authenticate to Google Cloud with service account key
        if: env.GCP_CREDENTIALS_JSON != ''
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ env.GCP_CREDENTIALS_JSON }}

      - name: Setup gcloud
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker "${GCP_REGION}-docker.pkg.dev" --quiet

      - name: Build and push container
        run: |
          IMAGE_URI="${GCP_REGION}-docker.pkg.dev/${GCP_PROJECT_ID}/${ARTIFACT_REGISTRY_REPOSITORY}/${IMAGE_NAME}:${GITHUB_SHA}"
          docker build --tag "${IMAGE_URI}" .
          docker push "${IMAGE_URI}"
          echo "IMAGE_URI=${IMAGE_URI}" >> "$GITHUB_ENV"

      - name: Deploy to Cloud Run
        run: |
          gcloud run deploy "${CLOUD_RUN_SERVICE}" \
            --image "${IMAGE_URI}" \
            --project "${GCP_PROJECT_ID}" \
            --region "${GCP_REGION}" \
            --platform managed \
            --allow-unauthenticated \
            --set-env-vars "APP_ENV=production,AUTH_REQUIRED=true,DB_PROVIDER=firestore,GOOGLE_CLOUD_PROJECT=${GCP_PROJECT_ID},GOOGLE_CLOUD_LOCATION=${GCP_REGION},FIRESTORE_DATABASE_ID=${FIRESTORE_DATABASE_ID},GCS_BUCKET=${GCS_BUCKET},ALLOWLIST_EMAILS=${ALLOWLIST_EMAILS},GEMINI_MODEL=gemini-2.5-pro,GEMINI_API_KEY_SECRET=gemini-api-key,GOOGLE_MAPS_API_KEY_SECRET=google-maps-api-key" \
            --set-secrets "GEMINI_API_KEY=gemini-api-key:latest,GOOGLE_MAPS_API_KEY=google-maps-api-key:latest"
